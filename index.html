<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Слайдер изображений</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Слайдер изображений</h1>

    <div class="slider">
      <img id="slider-image" src="https://picsum.photos/id/1015/1000/650" alt="Изображение 1">

      <div class="buttons">
        <button id="prev" type="button">Назад</button>
        <button id="next" type="button">Вперед</button>
      </div>

      <p id="counter">Изображение 1 из 5</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
